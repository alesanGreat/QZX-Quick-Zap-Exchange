server {
    listen 80 default_server;
    server_name qzx.yumbale.com www.qzx.yumbale.com;
    server_tokens off;
    root /var/www/html;
    index index.html;

    location = /sitemap.xml {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/sitemap.xml.php;
        fastcgi_param SCRIPT_NAME /sitemap.xml;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_buffer_size 64k;
        fastcgi_buffers 16 64k;
        fastcgi_busy_buffers_size 128k;
    }

    location = /sitemap.xml.php {
        return 404;
    }

    location = /seo-routes.json {
        return 404;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    location = /admin {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files /index.html =404;
    }

    location ^~ /admin/ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files /index.html =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\. {
        deny all;
    }

    location ~* (composer\.(json|lock)|package(-lock)?\.json|artisan|\.env|\.git|\.sql$|\.b64$) {
        return 404;
    }
}
